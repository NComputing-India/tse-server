name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PORT: ${{ secrets.PORT }}
      DB_URL: ${{ secrets.DB_URL }}
      username_NCIndia: ${{ secrets.username_NCIndia }}
      password_NCIndia: ${{ secrets.password_NCIndia }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up -d --build

      - name: Wait
        run: sleep 10

      - name: Health check
        run: curl -sS http://localhost:${PORT}/health

      - name: Stop containers
        if: always()
        run: docker compose down -v
